name: Build and push docker image

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Docker build 
      # This block safely injects your database password into the build context memory
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }} 
     # Built with network flag to ensure maven dependencies can download smoothly
      run: |
        docker build --network=host -t netflix_backend:latest .
